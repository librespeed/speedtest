<!DOCTYPE html>
<html lang="my">
<head>
<!-- ICON: replace icons/favicon.ico with your own file -->
<link rel="shortcut icon" href="icons/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no" />
<meta charset="UTF-8" />

<!-- STYLES: edit custom.css to change colours, fonts, and layout -->
<link rel="stylesheet" href="custom.css" />

<!-- TRANSLATIONS: edit translations.js to change all UI text strings -->
<script type="text/javascript" src="translations.js"></script>

<!-- CORE ENGINE: do not edit these two files -->
<script type="text/javascript" src="speedtest.js"></script>

<script type="text/javascript">
function I(i){return document.getElementById(i);}

//LIST OF TEST SERVERS. Leave empty if you're doing a standalone installation. See documentation for details
var SPEEDTEST_SERVERS=[
	/*{	//this server doesn't actually exist, remove it
		name:"Example Server 1",
		server:"//test1.mydomain.com/",
		dlURL:"backend/garbage.php",
		ulURL:"backend/empty.php",
		pingURL:"backend/empty.php",
		getIpURL:"backend/getIP.php"
	},
	{	//this server doesn't actually exist, remove it
		name:"Example Server 2",
		server:"//test2.example.com/",
		dlURL:"garbage.php",
		ulURL:"empty.php",
		pingURL:"empty.php",
		getIpURL:"getIP.php"
	}*/
];

//INITIALIZE SPEEDTEST
var s=new Speedtest();
s.setParameter("telemetry_level","basic");

//SERVER AUTO SELECTION
function initServers(){
	applyTranslations();

	if(SPEEDTEST_SERVERS.length==0){
		I("loading").className="hidden";
		I("serverArea").style.display="none";
		I("testWrapper").className="visible";
		initUI();
	}else{
		var noServersAvailable=function(){
			I("loadingMsg").textContent=UI_STRINGS.noServers;
		}
		var runServerSelect=function(){
			s.selectServer(function(server){
				if(server!=null){
					I("loading").className="hidden";
					for(var i=0;i<SPEEDTEST_SERVERS.length;i++){
						if(SPEEDTEST_SERVERS[i].pingT==-1) continue;
						var option=document.createElement("option");
						option.value=i;
						option.textContent=SPEEDTEST_SERVERS[i].name;
						if(SPEEDTEST_SERVERS[i]===server) option.selected=true;
						I("server").appendChild(option);
					}
					I("testWrapper").className="visible";
					initUI();
				}else{
					noServersAvailable();
				}
			});
		}
		if(typeof SPEEDTEST_SERVERS === "string"){
			s.loadServerList(SPEEDTEST_SERVERS,function(servers){
				if(servers==null){
					noServersAvailable();
				}else{
					SPEEDTEST_SERVERS=servers;
					runServerSelect();
				}
			});
		}else{
			s.addTestPoints(SPEEDTEST_SERVERS);
			runServerSelect();
		}
	}
}

// Gauge colours — change these in custom.css comments to stay consistent
var meterBk=/Trident.*rv:(\d+\.\d+)/i.test(navigator.userAgent)?"#EAEAEA":"#80808040";
var dlColor="#3b82f6",  // blue-500  — matches portal accent
    ulColor="#64748b";  // slate-500
var progColor=meterBk;

//CODE FOR GAUGES
function drawMeter(c,amount,bk,fg,progress,prog){
	var ctx=c.getContext("2d");
	var dp=window.devicePixelRatio||1;
	var cw=c.clientWidth*dp, ch=c.clientHeight*dp;
	var sizScale=ch*0.0055;
	if(c.width==cw&&c.height==ch){
		ctx.clearRect(0,0,cw,ch);
	}else{
		c.width=cw;
		c.height=ch;
	}
	ctx.beginPath();
	ctx.strokeStyle=bk;
	ctx.lineWidth=12*sizScale;
	ctx.arc(c.width/2,c.height-58*sizScale,c.height/1.8-ctx.lineWidth,-Math.PI*1.1,Math.PI*0.1);
	ctx.stroke();
	ctx.beginPath();
	ctx.strokeStyle=fg;
	ctx.lineWidth=12*sizScale;
	ctx.arc(c.width/2,c.height-58*sizScale,c.height/1.8-ctx.lineWidth,-Math.PI*1.1,amount*Math.PI*1.2-Math.PI*1.1);
	ctx.stroke();
	if(typeof progress !== "undefined"){
		ctx.fillStyle=prog;
		ctx.fillRect(c.width*0.3,c.height-16*sizScale,c.width*0.4*progress,4*sizScale);
	}
}
function mbpsToAmount(s){
	return 1-(1/(Math.pow(1.3,Math.sqrt(s))));
}
function format(d){
	d=Number(d);
	if(d<10) return d.toFixed(2);
	if(d<100) return d.toFixed(1);
	return d.toFixed(0);
}

//UI CODE
var uiData=null;
function startStop(){
	if(s.getState()==3){
		s.abort();
		data=null;
		I("startStopBtn").className="";
		I("server").disabled=false;
		initUI();
	}else{
		I("startStopBtn").className="running";
		I("startStopBtn").textContent=UI_STRINGS.abortBtn;
		I("shareArea").style.display="none";
		I("server").disabled=true;
		s.onupdate=function(data){
			uiData=data;
		};
		s.onend=function(aborted){
			I("startStopBtn").className="";
			I("startStopBtn").textContent=UI_STRINGS.startBtn;
			I("server").disabled=false;
			updateUI(true);
			if(!aborted){
				try{
					var testId=uiData.testId;
					if(testId!=null){
						var shareURL=window.location.href.substring(0,window.location.href.lastIndexOf("/"))+"/results/?id="+testId;
						I("resultsImg").src=shareURL;
						I("resultsImg").alt=UI_STRINGS.resultsAlt
							.replace("{dl}",uiData.dlStatus)
							.replace("{ul}",uiData.ulStatus)
							.replace("{ping}",uiData.pingStatus)
							.replace("{jitter}",uiData.jitterStatus);
						I("resultsURL").value=shareURL;
						I("testId").textContent=testId;
						I("shareArea").style.display="";
					}
				}catch(e){}
			}
		};
		s.start();
	}
}
function updateUI(forced){
	if(!forced&&s.getState()!=3) return;
	if(uiData==null) return;
	var status=uiData.testState;
	I("ip").textContent=uiData.clientIp;
	I("dlText").textContent=(status==1&&uiData.dlStatus==0)?"...":format(uiData.dlStatus);
	drawMeter(I("dlMeter"),mbpsToAmount(Number(uiData.dlStatus*(status==1?oscillate():1))),meterBk,dlColor,Number(uiData.dlProgress),progColor);
	I("ulText").textContent=(status==3&&uiData.ulStatus==0)?"...":format(uiData.ulStatus);
	drawMeter(I("ulMeter"),mbpsToAmount(Number(uiData.ulStatus*(status==3?oscillate():1))),meterBk,ulColor,Number(uiData.ulProgress),progColor);
	I("pingText").textContent=format(uiData.pingStatus);
	I("jitText").textContent=format(uiData.jitterStatus);
}
function oscillate(){
	return 1+0.02*Math.sin(Date.now()/100);
}
window.requestAnimationFrame=window.requestAnimationFrame||window.webkitRequestAnimationFrame||window.mozRequestAnimationFrame||window.msRequestAnimationFrame||(function(callback,element){setTimeout(callback,1000/60);});
function frame(){
	requestAnimationFrame(frame);
	updateUI();
}
frame();
function initUI(){
	drawMeter(I("dlMeter"),0,meterBk,dlColor,0);
	drawMeter(I("ulMeter"),0,meterBk,ulColor,0);
	I("dlText").textContent="";
	I("ulText").textContent="";
	I("pingText").textContent="";
	I("jitText").textContent="";
	I("ip").textContent="";
	I("startStopBtn").textContent=UI_STRINGS.startBtn;
}
// Apply all translation strings to the static HTML elements
function applyTranslations(){
	document.title=UI_STRINGS.pageTitle;
	I("navBrand").textContent=UI_STRINGS.navBrand;
	I("navSpeedtest").textContent=UI_STRINGS.navSpeedtest;
	I("pageHeading").textContent=UI_STRINGS.pageHeading;
	I("loadingMsg").innerHTML='<span class="loadCircle"></span>'+UI_STRINGS.loading;
	I("privacyBtn").textContent=UI_STRINGS.privacyLink;
	I("serverLabel").textContent=UI_STRINGS.serverLabel;
	I("pingLabel").textContent=UI_STRINGS.pingLabel;
	I("pingUnit").textContent=UI_STRINGS.pingUnit;
	I("jitterLabel").textContent=UI_STRINGS.jitterLabel;
	I("jitterUnit").textContent=UI_STRINGS.jitterUnit;
	I("dlLabel").textContent=UI_STRINGS.downloadLabel;
	I("dlUnit").textContent=UI_STRINGS.downloadUnit;
	I("ulLabel").textContent=UI_STRINGS.uploadLabel;
	I("ulUnit").textContent=UI_STRINGS.uploadUnit;
	I("shareHeading").textContent=UI_STRINGS.shareHeading;
	I("testIdLabel").textContent=UI_STRINGS.testIdLabel;
	I("sourceCodeLink").textContent=UI_STRINGS.sourceCode;
	I("privacyTitle").textContent=UI_STRINGS.privacyTitle;
	I("privacyBody").innerHTML=UI_STRINGS.privacyBody;
	I("closePrivacyBtn").textContent=UI_STRINGS.closeBtn;
	I("startStopBtn").textContent=UI_STRINGS.startBtn;
}
</script>
<title>LibreSpeed</title>
</head>
<body onload="initServers()">

<!-- Navbar — matches portal base.html style -->
<nav id="navbar">
  <a href="/" id="navBrand">Portal</a>
  <a href="/" class="nav-link active" id="navSpeedtest">Speed Test</a>
</nav>

<div class="content-wrap">
  <h1 id="pageHeading">အမြန်နှုန်းစမ်းသပ်မှု</h1>

  <div class="card">
    <div id="loading" class="visible">
      <p id="message"><span id="loadingMsg"><span class="loadCircle"></span>ဆာဗာရွေးချယ်နေသည်…</span></p>
    </div>

    <div id="testWrapper" class="hidden">
      <div id="startStopBtn" onclick="startStop()">စတင်ပါ</div><br/>
      <a class="privacy" id="privacyBtn" href="#" onclick="I('privacyPolicy').style.display=''">ကိုယ်ရေးအချက်အလက်</a>

      <div id="serverArea">
        <span id="serverLabel">ဆာဗာ :</span>
        <select id="server" onchange="s.setSelectedServer(SPEEDTEST_SERVERS[this.value])"></select>
      </div>

      <div id="test">
        <div class="testGroup">
          <div class="testArea2">
            <div id="pingLabel" class="testName">ပင်</div>
            <div id="pingText" class="meterText"></div>
            <div id="pingUnit" class="unit">ms</div>
          </div>
          <div class="testArea2">
            <div id="jitterLabel" class="testName">ဂျစ်တာ</div>
            <div id="jitText" class="meterText"></div>
            <div id="jitterUnit" class="unit">ms</div>
          </div>
        </div>
        <div class="testGroup">
          <div class="testArea">
            <div id="dlLabel" class="testName">ဒေါင်းလုတ်</div>
            <canvas id="dlMeter" class="meter"></canvas>
            <div id="dlText" class="meterText"></div>
            <div id="dlUnit" class="unit">Mbit/s</div>
          </div>
          <div class="testArea">
            <div id="ulLabel" class="testName">အပ်လုတ်</div>
            <canvas id="ulMeter" class="meter"></canvas>
            <div id="ulText" class="meterText"></div>
            <div id="ulUnit" class="unit">Mbit/s</div>
          </div>
        </div>

        <div id="ipArea">
          <span id="ip"></span>
        </div>

        <div id="shareArea" style="display:none">
          <h3 id="shareHeading">ရလဒ်မျှဝေပါ</h3>
          <p><span id="testIdLabel">စမ်းသပ်မှတ်တမ်း ID :</span> <span id="testId"></span></p>
          <input type="text" value="" id="resultsURL" readonly="readonly"
            onclick="this.select();this.focus();document.execCommand('copy');alert(UI_STRINGS.linkCopied)"/>
          <img src="" id="resultsImg" />
        </div>
      </div>

      <a id="sourceCodeLink" href="https://github.com/librespeed/speedtest">အရင်းအမြစ်ကုဒ်</a>
    </div>
  </div><!-- /.card -->
</div><!-- /.content-wrap -->

<!-- Privacy policy modal -->
<div id="privacyPolicy" style="display:none">
  <h2 id="privacyTitle">ကိုယ်ရေးကိုယ်တာ မူဝါဒ</h2>
  <div id="privacyBody"></div>
  <br/>
  <div class="closePrivacyPolicy">
    <a class="privacy" id="closePrivacyBtn" href="#" onclick="I('privacyPolicy').style.display='none'">ပိတ်မည်</a>
  </div>
  <br/>
</div>

</body>
</html>
